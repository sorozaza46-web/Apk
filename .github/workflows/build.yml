name: Build Bot EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Tüm Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        # OpenCV recursion hatasını engellemek için uyumlu kütüphane seti
        pip install opencv-python-headless numpy pillow customtkinter pyautogui ultralytics pyinstaller

    - name: PyInstaller ile EXE Oluştur (Hibrit Sistem)
      run: |
        # Hem yapay zeka modelini hem de mantar görselini içeri gömüyoruz
        pyinstaller --noconsole --onefile --collect-all cv2 --add-data "best.pt;." --add-data "mantar.png;." main.py

    - name: EXE Dosyasını Çıktı Olarak Paylaş
      uses: actions/upload-artifact@v4
      with:
        name: FishingBot-EXE
        path: dist/main.exe
        
