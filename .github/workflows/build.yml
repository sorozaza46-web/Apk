name: Build Bot EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Tüm Kütüphaneleri Sırayla Yükle (Tek Dosya Yönetimi)
      run: |
        python -m pip install --upgrade pip
        # PyInstaller çakışmasını engellemek için kararlı OpenCV ve ana kütüphaneler
        pip install opencv-python-headless numpy pillow customtkinter pyautogui ultralytics pyinstaller

    - name: PyInstaller ile EXE Oluştur
      run: |
        # --collect-all cv2 parametresi OpenCV'nin tüm binary bileşenlerini eksiksiz paketler
        pyinstaller --noconsole --onefile --collect-all cv2 --add-data "best.pt;." main.py

    - name: EXE Dosyasını Çıktı Olarak Paylaş
      uses: actions/upload-artifact@v4
      with:
        name: FishingBot-EXE
        path: dist/main.exe
        
