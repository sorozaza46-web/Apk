name: Build C++ Fishing Bot v4

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Kopyala (Checkout)
      uses: actions/checkout@v3

    # 1. ADIM: Python kurup .pt modelini otomatik olarak .onnx formatına çeviriyoruz
    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Model Dönüştürücü Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install ultralytics onnx

    - name: .pt Modelini ONNX Formatına Dönüştür
      run: |
        python -c "from ultralytics import YOLO; model = YOLO('best.pt'); model.export(format='onnx')"
        echo "Model basariyla best.onnx formatina cevrildi!"

    # 2. ADIM: C++ Bağımlılıklarını (vcpkg üzerinden OpenCV ve ONNX Runtime) Kuruyoruz
    - name: MSBuild ve MSVC Derleyici Ortamını Hazırla
      uses: microsoft/setup-msbuild@v1.1

    - name: C++ Paket Yöneticisi (vcpkg) Entegrasyonu
      run: |
        vcpkg integrate install

    - name: OpenCV ve ONNX Runtime Kur (C++)
      run: |
        vcpkg install opencv:x64-windows
        vcpkg install onnxruntime:x64-windows

    # 3. ADIM: C++ Kodunu Derle ve EXE Oluştur
    - name: C++ Projesini Derle
      run: |
        # vcpkg üzerinden gelen kütüphane yollarını otomatik bağlayarak cl.exe ile derleme yapıyoruz
        cl.exe /EHsc /O2 main.cpp /I"C:\vcpkg\installed\x64-windows\include" /link /LIBPATH:"C:\vcpkg\installed\x64-windows\lib" opencv_world410.lib onnxruntime.lib /OUT:FishingBot.exe
      shell: cmd

    # 4. ADIM: Hazır EXE ve Bağımlı DLL'leri Paketle
    - name: Çıktıları Hazırla
      run: |
        mkdir dist
        copy FishingBot.exe dist\
        copy best.onnx dist\
        if exist mantar.png copy mantar.png dist\
        # Gerekli çalışma zamanı DLL'lerini de yanına koyuyoruz
        copy C:\vcpkg\installed\x64-windows\bin\opencv_world*.dll dist\
        copy C:\vcpkg\installed\x64-windows\bin\onnxruntime.dll dist\
      shell: cmd

    - name: Tam Otomatik C++ Bot Paketini Çıktı Olarak Paylaş
      uses: actions/upload-artifact@v4
      with:
        name: FishingBot-CPP-Package
        path: dist/*
        
